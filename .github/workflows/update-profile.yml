name: Update profile

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/generate-profile.mjs"
      - ".github/workflows/update-profile.yml"
  schedule:
    - cron: "15 1 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate README and activity card
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: jomeswang
        run: node scripts/generate-profile.mjs

      - name: Commit changes if needed
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/activity-card.svg
          git commit -m "chore: update profile stats"
          git push
